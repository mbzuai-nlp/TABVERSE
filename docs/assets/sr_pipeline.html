<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;
         display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; padding: 20px; }
  .title { font-size: 14px; font-weight: 800; color: #1e293b; margin-bottom: 28px; text-align: center; }
  .flow { display: flex; align-items: center; gap: 0; }
  .node { border-radius: 14px; padding: 18px 22px; text-align: center; min-width: 120px; }
  .n-struct { background: #ede9fe; border: 2px solid #a78bfa; }
  .n-image  { background: #fef9c3; border: 2px solid #facc15; }
  .n-pred   { background: #ede9fe; border: 2px dashed #a78bfa; }
  .n-eval   { background: #dcfce7; border: 2px solid #4ade80; }
  .node-title { font-size: 15px; font-weight: 800; color: #1e293b; }
  .node-sub   { font-size: 11px; color: #6b7280; margin-top: 4px; }
  .arrow-block { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 0 6px; }
  .arrow-label { font-size: 11px; font-weight: 600; color: #64748b; }
  .arrow-svg { }
  /* Evaluate box sits below */
  .eval-wrap { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
  .eval-line { width: 2px; height: 22px; background: #94a3b8; }
  .bracket { width: 100%; display: flex; align-items: flex-end; justify-content: center; position: relative; }
  .h-line { height: 2px; background: #94a3b8; }
</style>
</head>
<body>
<div class="title">Structure Reconstruction (SR) Pipeline</div>

<div style="display:flex;flex-direction:column;align-items:center;">
  <!-- Main flow row -->
  <div class="flow">
    <div class="node n-struct">
      <div class="node-title">Structure</div>
      <div class="node-sub">(x)</div>
      <div style="font-size:10px;color:#7c3aed;margin-top:6px;">HTML / Markdown / LaTeX</div>
    </div>

    <div class="arrow-block">
      <div class="arrow-label">Renderer</div>
      <svg width="52" height="14" viewBox="0 0 52 14">
        <line x1="0" y1="7" x2="42" y2="7" stroke="#94a3b8" stroke-width="2"/>
        <polygon points="40,3 52,7 40,11" fill="#94a3b8"/>
      </svg>
    </div>

    <div class="node n-image">
      <div class="node-title">Image</div>
      <div class="node-sub">Rendered PNG</div>
      <div style="font-size:10px;color:#78350f;margin-top:6px;">3 aligned renders</div>
    </div>

    <div class="arrow-block">
      <div class="arrow-label">VLM</div>
      <svg width="52" height="14" viewBox="0 0 52 14">
        <line x1="0" y1="7" x2="42" y2="7" stroke="#94a3b8" stroke-width="2"/>
        <polygon points="40,3 52,7 40,11" fill="#94a3b8"/>
      </svg>
    </div>

    <div class="node n-pred">
      <div class="node-title">Structure</div>
      <div class="node-sub">(x′)</div>
      <div style="font-size:10px;color:#7c3aed;margin-top:6px;">Reconstructed</div>
    </div>
  </div>

  <!-- Evaluate row below with bracket -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;width:460px;margin-top:4px;">
    <!-- left arm -->
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="width:2px;height:16px;background:#94a3b8;"></div>
      <div style="width:200px;height:2px;background:#94a3b8;"></div>
    </div>
    <!-- right arm -->
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="width:2px;height:16px;background:#94a3b8;"></div>
      <div style="width:200px;height:2px;background:#94a3b8;"></div>
    </div>
  </div>

  <!-- downward line to Evaluate -->
  <div style="width:2px;height:18px;background:#94a3b8;"></div>

  <!-- Evaluate box -->
  <div class="node n-eval" style="min-width:280px;">
    <div class="node-title">Evaluate</div>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap;">
      <span style="font-size:11px;background:#bbf7d0;border-radius:6px;padding:3px 9px;font-weight:700;color:#15803d;">GriTS-Topology</span>
      <span style="font-size:11px;background:#bbf7d0;border-radius:6px;padding:3px 9px;font-weight:700;color:#15803d;">GriTS-Content</span>
      <span style="font-size:11px;background:#bbf7d0;border-radius:6px;padding:3px 9px;font-weight:700;color:#15803d;">Usability</span>
    </div>
  </div>
</div>
</body>
</html>
